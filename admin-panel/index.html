<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sekai-snake - Admin Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
    h1 { margin-bottom: 30px; color: #333; }
    .section { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    .section h2 { margin-bottom: 15px; color: #444; }
  </style>
</head>
<body>
  <h1>Админ-панель sekai-snake</h1>
  
  <div class="section">
    <h2>Предложения голов</h2>
    <div id="submissions-list"></div>
  </div>
  
  <div class="section">
    <h2>Все чаты</h2>
    <div id="chat-list"></div>
  </div>
  
  <div class="section">
    <h2>Управление серверами</h2>
    <div id="servers-admin-list"></div>
  </div>
  
  <div class="section">
    <h2>Управление игроками</h2>
    <div id="users-admin-list"></div>
  </div>
</body>
</html>
