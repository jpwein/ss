<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>sekai-snake - Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
      touch-action: none;
      background: #1f2a20;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      transition: filter 0.25s ease;
    }
    body.dead #game-container {
      filter: blur(7px);
    }
    
    .username-label {
      color: white;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
    
    .clan-label {
      color: #9ee0a3;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 1px 1px 0px rgba(0,0,0,0.8);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
    .hud-panel {
      position: fixed;
      background: rgba(12, 18, 14, 0.72);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      backdrop-filter: blur(8px);
      z-index: 20;
    }
    .hud-button {
      position: fixed;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      background: rgba(12, 18, 14, 0.72);
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      z-index: 30;
      backdrop-filter: blur(8px);
    }
    .hud-button:hover {
      background: rgba(18, 28, 21, 0.88);
    }
    #leaderboard {
      top: 20px;
      right: 20px;
      width: 220px;
      max-height: 40vh;
      padding: 16px;
      overflow-y: auto;
    }
    #leaderboard h3 {
      margin-bottom: 12px;
      font-size: 16px;
    }
    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 6px 0;
      font-size: 14px;
    }
    .leaderboard-item span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #toggle-clans {
      top: 20px;
      right: 252px;
      min-width: 92px;
      height: 42px;
      padding: 0 14px;
    }
    #clan-panel {
      top: 72px;
      right: 252px;
      width: 260px;
      padding: 14px;
    }
    #clan-panel.hidden {
      display: none;
    }
    #clan-panel h3 {
      font-size: 15px;
      margin-bottom: 10px;
    }
    .clan-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
    }
    .clan-row:first-child {
      border-top: none;
    }
    .clan-row button,
    #create-clan,
    #leave-clan {
      border: none;
      border-radius: 8px;
      background: #6fbf73;
      color: #09200d;
      padding: 7px 9px;
      font-weight: 700;
      cursor: pointer;
    }
    #leave-clan {
      width: 100%;
      margin-top: 8px;
      background: #d4d6a5;
    }
    #clan-name {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      padding: 9px 10px;
      margin-bottom: 8px;
      outline: none;
    }
    #clan-name::placeholder {
      color: rgba(255,255,255,0.68);
    }
    #clan-status {
      min-height: 18px;
      margin-top: 8px;
      color: #d4d6a5;
      font-size: 12px;
    }
    #minimap-wrap {
      position: fixed;
      left: 20px;
      bottom: 20px;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.35);
      background: rgba(12, 18, 14, 0.72);
      z-index: 20;
      backdrop-filter: blur(8px);
    }
    #minimap {
      width: 100%;
      height: 100%;
      display: block;
    }
    #chat {
      left: 20px;
      bottom: 205px;
      width: 320px;
      max-width: calc(100vw - 40px);
      padding: 14px;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #chat.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
    }
    #chat-messages {
      height: 130px;
      overflow-y: auto;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.14);
      padding-bottom: 10px;
    }
    .chat-message {
      font-size: 14px;
      margin-bottom: 6px;
      overflow-wrap: anywhere;
    }
    .chat-message strong {
      color: #9ee0a3;
    }
    #chat-input {
      width: calc(100% - 74px);
      padding: 9px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.12);
      color: white;
      outline: none;
    }
    #chat-input::placeholder {
      color: rgba(255,255,255,0.68);
    }
    #chat-send {
      width: 66px;
      padding: 9px;
      border: none;
      border-radius: 8px;
      background: #6fbf73;
      color: #09200d;
      font-weight: 700;
      cursor: pointer;
    }
    #toggle-chat {
      left: 20px;
      bottom: 385px;
      height: 40px;
      padding: 0 14px;
    }
    #death-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(4, 8, 5, 0.42);
      z-index: 60;
      backdrop-filter: blur(4px);
    }
    #death-overlay.hidden {
      display: none;
    }
    .death-dialog {
      width: min(420px, calc(100vw - 32px));
      border-radius: 8px;
      background: rgba(10, 14, 11, 0.9);
      border: 1px solid rgba(255,255,255,0.14);
      color: white;
      padding: 28px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0,0,0,0.35);
    }
    .death-dialog h2 {
      font-size: clamp(34px, 9vw, 58px);
      line-height: 1;
      margin-bottom: 12px;
    }
    .death-dialog p {
      margin-bottom: 22px;
      color: rgba(255,255,255,0.76);
    }
    .death-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .death-actions button {
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    #restart-game {
      background: #6fbf73;
      color: #09200d;
    }
    #return-lobby {
      background: rgba(255,255,255,0.14);
      color: white;
    }
    #joystick-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 150px;
      height: 150px;
      display: none;
      z-index: 30;
    }
    #joystick-base {
      position: absolute;
      width: 150px;
      height: 150px;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
    }
    #joystick-handle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.38);
      border-radius: 50%;
    }
    @media (max-width: 768px) {
      #leaderboard {
        top: 10px;
        right: 10px;
        width: 168px;
        padding: 12px;
      }
      #toggle-clans {
        top: 10px;
        right: 188px;
      }
      #clan-panel {
        top: 62px;
        right: 10px;
        width: calc(100vw - 20px);
      }
      #joystick-container {
        display: block;
      }
      #minimap-wrap {
        width: 135px;
        height: 135px;
        left: 12px;
        bottom: 12px;
      }
      #chat {
        left: 12px;
        bottom: 158px;
      }
      #toggle-chat {
        left: 12px;
        bottom: 336px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="css2d-container"></div>

  <button id="toggle-chat" class="hud-button">Чат</button>

  <div id="leaderboard" class="hud-panel">
    <h3 id="leaderboard-title">Лидерборд</h3>
    <div id="leaderboard-list"></div>
  </div>

  <button id="toggle-clans" class="hud-button">Кланы</button>
  <div id="clan-panel" class="hud-panel hidden">
    <h3>Кланы</h3>
    <input type="text" id="clan-name" maxlength="18" placeholder="Название клана">
    <button id="create-clan">Создать</button>
    <button id="leave-clan">Выйти из клана</button>
    <div id="clan-status"></div>
    <div id="clan-list"></div>
  </div>

  <div id="chat" class="hud-panel">
    <div id="chat-messages"></div>
    <input type="text" id="chat-input" maxlength="200" placeholder="Написать сообщение...">
    <button id="chat-send">Отпр.</button>
  </div>

  <div id="minimap-wrap">
    <canvas id="minimap"></canvas>
  </div>

  <div id="death-overlay" class="hidden">
    <div class="death-dialog">
      <h2>Ты умер</h2>
      <p id="death-reason">Врезался в тело другого игрока.</p>
      <div class="death-actions">
        <button id="restart-game">Начать заново</button>
        <button id="return-lobby">Вернуться в лобби</button>
      </div>
    </div>
  </div>

  <div id="joystick-container">
    <div id="joystick-base"></div>
    <div id="joystick-handle"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
